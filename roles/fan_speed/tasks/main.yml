- name: Install ipmitool if not already installed
  ansible.builtin.package: 
    name: ipmitool
    state: present

- name: Print manufacturer
  ansible.builtin.debug:
    msg: The manufacturer is {{ ansible_system_vendor }}

- name: Check Fan-Speed for Dell
  ansible.builtin.command: ipmitool raw 0x30 0x30 0x01 0x00
  ansible.builtin.debug:
    msg: The manufacturer is {{ ansible_system_vendor }}
  when: ansible_system_vendor|lower == 'dell'

- name: Check Fan-Speed for Lenovo
  ansible.builtin.command: ipmitool raw 0x3a 0x07 0x01 0xB2 0x01; ipmitool raw 0x3a 0x07 0x02 0xB2 0x01; ipmitool raw 0x3a 0x07 0x03 0xB2 0x01; ipmitool raw 0x3a 0x07 0x04 0xB2 0x01
  ansible.builtin.debug:
    msg: The manufacturer is {{ ansible_system_vendor }}
  when: ansible_system_vendor|lower == 'lenovo'

- name: Check Fan-Speed for Supermicro
  ansible.builtin.command: ipmitool raw 0x30 0x45 1 1
  ansible.builtin.debug:
    msg: The manufacturer is {{ ansible_system_vendor }}
  when: ansible_system_vendor|lower == 'supermicro'
