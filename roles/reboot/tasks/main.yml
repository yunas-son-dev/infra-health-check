---
- name: Reboot machine
  ansible.builtin.reboot:
    reboot_timeout: 600

- name: Wait for machine to become reachable
  ansible.builtin.wait_for_connection:
    delay: 10
    timeout: 300

- name: Confirm machine is back online
  ansible.builtin.debug:
    msg: "Machine {{ inventory_hostname }} has rebooted and is back online."
